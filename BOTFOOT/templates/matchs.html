<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Matchs du jour - HiddenBoot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080C14; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; min-height: 100vh; }

        .sidebar { width: 240px; min-height: 100vh; background: #0D1321; border-right: 1px solid #1a2540; padding: 30px 0; position: fixed; }
        .logo { padding: 0 25px 30px; border-bottom: 1px solid #1a2540; margin-bottom: 20px; }
        .logo h1 { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .logo h1 span { color: #00D4FF; }
        .logo p { color: #4a6080; font-size: 11px; margin-top: 4px; text-transform: uppercase; letter-spacing: 2px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 13px 25px; color: #4a6080; text-decoration: none; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { color: #00D4FF; background: rgba(0, 212, 255, 0.05); border-left: 3px solid #00D4FF; }
        .nav-section { padding: 20px 25px 8px; color: #2a3a50; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

        .main { margin-left: 240px; padding: 30px; flex: 1; }
        .page-header { margin-bottom: 30px; }
        .page-header h2 { font-size: 24px; font-weight: 700; }
        .page-header p { color: #4a6080; font-size: 13px; margin-top: 5px; }

        .loading {
            text-align: center;
            padding: 60px;
            color: #4a6080;
        }
        .loading .spinner {
            width: 40px; height: 40px;
            border: 3px solid #1a2540;
            border-top: 3px solid #00D4FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ligue-block {
            background: #0D1321;
            border: 1px solid #1a2540;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .ligue-header {
            padding: 12px 20px;
            border-bottom: 1px solid #1a2540;
            background: rgba(0, 212, 255, 0.03);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ligue-header h3 { color: #00D4FF; font-size: 14px; font-weight: 600; }

        .match-row {
            display: grid;
            grid-template-columns: 80px 1fr 80px 1fr 100px 120px;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #0a1020;
            gap: 10px;
        }

        .match-row:last-child { border-bottom: none; }
        .match-row:hover { background: rgba(0, 212, 255, 0.03); }

        .match-time {
            color: #00D4FF;
            font-weight: 600;
            font-size: 14px;
        }

        .team-home { text-align: right; font-weight: 600; font-size: 14px; }
        .team-away { font-weight: 600; font-size: 14px; }

        .score-box {
            background: #1a2540;
            border-radius: 6px;
            padding: 6px 12px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            min-width: 60px;
        }

        .score-live {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .score-upcoming {
            color: #4a6080;
        }

        .confiance {
            text-align: right;
        }

        .confiance-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .conf-high { background: rgba(0, 212, 255, 0.15); color: #00D4FF; border: 1px solid #00D4FF; }
        .conf-med { background: rgba(255, 165, 0, 0.15); color: #FFA500; border: 1px solid #FFA500; }
        .conf-low { background: rgba(100, 100, 100, 0.15); color: #666; border: 1px solid #444; }

        .score-diff {
            font-size: 11px;
            color: #4a6080;
            margin-top: 3px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <h1>HIDDEN<span>BOOT</span></h1>
        <p>Football Analytics</p>
    </div>
    <div class="nav-section">Menu</div>
    <a href="/" class="nav-item"><span>🏠</span> Dashboard</a>
    <a href="/pepites" class="nav-item"><span>⚽</span> Pépites</a>
    <a href="/matchs" class="nav-item active"><span>🎯</span> Matchs du jour</a>
    <a href="/analyse" class="nav-item"><span>📊</span> Analyse</a>
</div>

<div class="main">
    <div class="page-header">
        <h2>🎯 Matchs du jour</h2>
        <p id="date-today"></p>
    </div>

    <div id="matchs-container">
        <div class="loading">
            <div class="spinner"></div>
            <p>Chargement des matchs...</p>
        </div>
    </div>
</div>

<script>
    // Date du jour
    document.getElementById('date-today').textContent = new Date().toLocaleDateString('fr-FR', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // Charger les matchs depuis notre API Flask
    fetch('/api/matchs-jour')
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('matchs-container');

            if (!data.ligues || Object.keys(data.ligues).length === 0) {
                container.innerHTML = '<div class="loading"><p>Aucun match trouvé aujourd\'hui</p></div>';
                return;
            }

            let html = '';
            for (const [ligue, matchs] of Object.entries(data.ligues)) {
                html += `<div class="ligue-block">
                    <div class="ligue-header"><h3>🏆 ${ligue}</h3></div>`;

                matchs.forEach(m => {
                    const diff = Math.abs(m.score_home - m.score_away);
                    let confClass = 'conf-low';
                    let confLabel = 'Incertain';
                    if (diff > 50) { confClass = 'conf-high'; confLabel = '🔥 Forte forme'; }
                    else if (diff > 20) { confClass = 'conf-med'; confLabel = '⚡ Légère faveur'; }

                    const scoreBox = m.statut === 'live'
                        ? `<div class="score-box score-live">${m.goals_home} - ${m.goals_away}</div>`
                        : `<div class="score-box score-upcoming">${m.heure}</div>`;

                    html += `<div class="match-row">
                        <div class="match-time">${m.heure}</div>
                        <div class="team-home">${m.home}</div>
                        ${scoreBox}
                        <div class="team-away">${m.away}</div>
                        <div class="confiance">
                            <div class="confiance-badge ${confClass}">${confLabel}</div>
                            <div class="score-diff">Écart: ${diff} pts</div>
                        </div>
                    </div>`;
                });

                html += '</div>';
            }
            container.innerHTML = html;
        })
        .catch(() => {
            document.getElementById('matchs-container').innerHTML =
                '<div class="loading"><p>Erreur de chargement</p></div>';
        });
</script>

</body>
</html>
