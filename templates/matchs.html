<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Matchs du jour - HiddenBoot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080C14; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; min-height: 100vh; }

        .sidebar { width: 240px; min-height: 100vh; background: #0D1321; border-right: 1px solid #1a2540; padding: 30px 0; position: fixed; }
        .logo { padding: 0 25px 30px; border-bottom: 1px solid #1a2540; margin-bottom: 20px; }
        .logo h1 { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .logo h1 span { color: #00D4FF; }
        .logo p { color: #4a6080; font-size: 11px; margin-top: 4px; text-transform: uppercase; letter-spacing: 2px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 13px 25px; color: #4a6080; text-decoration: none; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { color: #00D4FF; background: rgba(0, 212, 255, 0.05); border-left: 3px solid #00D4FF; }
        .nav-section { padding: 20px 25px 8px; color: #2a3a50; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

        .main { margin-left: 240px; padding: 30px; flex: 1; }
        .page-header { margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; }
        .page-header h2 { font-size: 24px; font-weight: 700; }
        .page-header p { color: #4a6080; font-size: 13px; margin-top: 5px; }

        .loading { text-align: center; padding: 60px; color: #4a6080; }
        .spinner { width: 40px; height: 40px; border: 3px solid #1a2540; border-top: 3px solid #00D4FF; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .ligue-block { background: #0D1321; border: 1px solid #1a2540; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .ligue-header { padding: 12px 20px; border-bottom: 1px solid #1a2540; background: rgba(0, 212, 255, 0.03); }
        .ligue-header h3 { color: #00D4FF; font-size: 13px; font-weight: 600; }

        .match-card {
            padding: 15px 20px;
            border-bottom: 1px solid #0a1020;
            transition: background 0.15s;
        }
        .match-card:last-child { border-bottom: none; }
        .match-card:hover { background: rgba(0, 212, 255, 0.02); }

        .match-top {
            display: grid;
            grid-template-columns: 100px 1fr auto 1fr 100px;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .match-heure { color: #00D4FF; font-weight: 600; font-size: 13px; }
        .match-live { color: #ff4444; font-weight: 700; font-size: 12px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .team-home { text-align: right; }
        .team-away { text-align: left; }
        .team-nom { font-weight: 600; font-size: 14px; }
        .team-rang { color: #4a6080; font-size: 11px; margin-top: 2px; }

        .score-box {
            background: #1a2540;
            border-radius: 8px;
            padding: 8px 16px;
            text-align: center;
            min-width: 70px;
        }
        .score-chiffre { font-weight: 700; font-size: 18px; }
        .score-upcoming { color: #4a6080; font-size: 13px; }
        .score-live { border: 1px solid #ff4444; }

        .forme-mini { display: flex; gap: 2px; margin-top: 4px; }
        .forme-mini.right { justify-content: flex-end; }
        .f-dot { width: 7px; height: 7px; border-radius: 50%; }
        .f-W { background: #00D4FF; }
        .f-D { background: #FFA500; }
        .f-L { background: #ff4444; }
        .f-x { background: #1a2540; }

        /* BARRE POURCENTAGE */
        .pct-bar-container { margin-top: 10px; }
        .pct-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .pct-home-label { color: #00D4FF; font-weight: 700; }
        .pct-away-label { color: #fff; font-weight: 700; }
        .pct-center-label { color: #4a6080; font-size: 11px; }

        .pct-bar {
            height: 6px;
            background: #1a2540;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
        }
        .pct-bar-home {
            height: 100%;
            background: linear-gradient(90deg, #00D4FF, #0099bb);
            border-radius: 3px 0 0 3px;
            transition: width 0.5s ease;
        }
        .pct-bar-away {
            height: 100%;
            background: linear-gradient(90deg, #ff6644, #ff4444);
            border-radius: 0 3px 3px 0;
            flex: 1;
        }

        .pct-high { color: #00ff87 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <h1>HIDDEN<span>BOOT</span></h1>
        <p>Football Analytics</p>
    </div>
    <div class="nav-section">Menu</div>
    <a href="/" class="nav-item"><span>🏠</span> Dashboard</a>
    <a href="/pepites" class="nav-item"><span>⚽</span> Pépites</a>
    <a href="/matchs" class="nav-item active"><span>🎯</span> Matchs du jour</a>
    <a href="/analyse" class="nav-item"><span>📊</span> Analyse</a>
</div>

<div class="main">
    <div class="page-header">
        <div>
            <h2>🎯 Matchs du jour</h2>
            <p id="date-today"></p>
        </div>
    </div>

    <div id="matchs-container">
        <div class="loading">
            <div class="spinner"></div>
            <p>Chargement des matchs...</p>
        </div>
    </div>
</div>

<script>
document.getElementById('date-today').textContent = new Date().toLocaleDateString('fr-FR', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

function openButeurs(equipeId, equipeNom) {
    document.getElementById('panel-titre').textContent = '⚽ ' + equipeNom;
    document.getElementById('buteurs-panel').style.display = 'block';
    document.getElementById('panel-overlay').style.display = 'block';
    document.getElementById('panel-content').innerHTML = '<div style="text-align:center;color:#4a6080;padding:40px">Chargement...</div>';

    fetch('/api/equipe/' + equipeId + '/buteurs')
        .then(r => r.json())
        .then(data => {
            if (!data.joueurs || data.joueurs.length === 0) {
                document.getElementById('panel-content').innerHTML = 
                    '<div style="text-align:center;color:#4a6080;padding:40px">Aucun buteur trouvé</div>';
                return;
            }

            let html = '';
            data.joueurs.forEach((j, i) => {
                const scoreColor = j.score > 50 ? '#00ff87' : j.score > 20 ? '#00D4FF' : '#fff';
                const pctBut = Math.min(99, Math.round(j.ratio * 100));
                
                html += `
                <div style="
                    background: #080C14;
                    border: 1px solid #1a2540;
                    border-radius: 10px;
                    padding: 14px;
                    margin-bottom: 10px;
                    display: flex;
                    gap: 12px;
                    align-items: center;
                ">
                    <img src="https://media.api-sports.io/football/players/${j.joueur_id}.png"
                         onerror="this.src='https://via.placeholder.com/40x40/1a2540/4a6080?text=?'"
                         style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;">
                    <div style="flex:1">
                        <div style="font-weight:600;font-size:14px;margin-bottom:4px">${j.nom}</div>
                        <div style="display:flex;gap:12px;font-size:12px;color:#4a6080;margin-bottom:6px">
                            <span>⚽ ${j.buts} buts</span>
                            <span>🅰️ ${j.passes} passes</span>
                            <span>⭐ ${j.note}</span>
                        </div>
                        <div style="background:#1a2540;border-radius:3px;height:4px;overflow:hidden">
                            <div style="width:${pctBut}%;height:100%;background:linear-gradient(90deg,#00D4FF,#00ff87);border-radius:3px"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:3px">
                            <span style="color:#4a6080">Probabilité but</span>
                            <span style="color:${scoreColor};font-weight:700">${pctBut}%</span>
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('panel-content').innerHTML = html;
        });
}

function closePanel() {
    document.getElementById('buteurs-panel').style.display = 'none';
    document.getElementById('panel-overlay').style.display = 'none';
}

fetch('/api/matchs-jour')
    .then(r => r.json())
    .then(data => {
        const container = document.getElementById('matchs-container');

        if (!data.ligues || Object.keys(data.ligues).length === 0) {
            container.innerHTML = '<div class="loading"><p>Aucun match trouvé aujourd\'hui dans nos ligues</p></div>';
            return;
        }

        let html = '';

        for (const [ligue, matchs] of Object.entries(data.ligues)) {
            html += `<div class="ligue-block">
                <div class="ligue-header"><h3>🏆 ${ligue}</h3></div>`;

            matchs.forEach(m => {
                const scoreBox = m.est_live
                    ? `<div class="score-box score-live">
                        <div class="score-chiffre">${m.goals_home ?? 0} - ${m.goals_away ?? 0}</div>
                        <div class="match-live">LIVE</div>
                       </div>`
                    : `<div class="score-box">
                        <div class="score-upcoming">${m.heure}</div>
                       </div>`;

                const formeDots = (forme, align) => {
                    let dots = '';
                    for (let f of forme) {
                        dots += `<div class="f-dot f-${f || 'x'}"></div>`;
                    }
                    return `<div class="forme-mini ${align}">${dots}</div>`;
                };

                const pctHomeClass = m.pct_home >= 65 ? 'pct-high' : '';

                html += `<div class="match-card">
                    <div class="match-top">
                        <div class="team-home" style="cursor:pointer" onclick="openButeurs(${m.home_id}, '${m.home}')">
                            <div class="team-nom" style="color:#00D4FF">${m.home} 🔍</div>
                            <div class="team-rang">${m.rang_home !== '?' ? m.rang_home + 'ème' : ''}</div>
                            ${formeDots(m.forme_home, 'right')}
                        </div>
                        ${scoreBox}
                        <div class="team-away" style="cursor:pointer" onclick="openButeurs(${m.away_id}, '${m.away}')">
                            <div class="team-nom" style="color:#00D4FF">${m.away} 🔍</div>
                            <div class="team-rang">${m.rang_away !== '?' ? m.rang_away + 'ème' : ''}</div>
                            ${formeDots(m.forme_away, '')}
                        </div>
                        <div></div>
                    </div>
                    <div class="pct-bar-container">
                        <div class="pct-labels">
                            <span class="pct-home-label ${pctHomeClass}">${m.pct_home}%</span>
                            <span class="pct-center-label">Probabilité de victoire</span>
                            <span class="pct-away-label">${m.pct_away}%</span>
                        </div>
                        <div class="pct-bar">
                            <div class="pct-bar-home" style="width: ${m.pct_home}%"></div>
                            <div class="pct-bar-away"></div>
                        </div>
                    </div>
                </div>`;
            });

            html += '</div>';
        }

        container.innerHTML = html;
    })
    .catch(err => {
        document.getElementById('matchs-container').innerHTML =
            '<div class="loading"><p>Erreur de chargement</p></div>';
        console.error(err);
    });
</script>
<div id="buteurs-panel" style="
    display: none;
    position: fixed;
    right: 0; top: 0;
    width: 380px;
    height: 100vh;
    background: #0D1321;
    border-left: 1px solid #1a2540;
    z-index: 1000;
    overflow-y: auto;
    padding: 25px;
">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 id="panel-titre" style="color: #00D4FF; font-size: 16px;"></h3>
        <button onclick="closePanel()" style="
            background: none; border: 1px solid #1a2540;
            color: #4a6080; padding: 6px 12px;
            border-radius: 6px; cursor: pointer;
            font-size: 13px;
        ">✕ Fermer</button>
    </div>
    <div id="panel-content">
        <div style="text-align: center; color: #4a6080; padding: 40px;">Chargement...</div>
    </div>
</div>

<div id="panel-overlay" onclick="closePanel()" style="
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
"></div>
</body>
</html>
